services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"          # only nginx is exposed to the outside world
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./client
    # no ports exposed anymore — nginx handles it
    volumes:
      - ./client/src:/app/src
    depends_on:
      - backend

  backend:
    build: ./server
    # no ports exposed anymore — nginx handles it
    volumes:
      - ./server/src:/app/src
    env_file:
      - .env
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2-20
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo

volumes:
  mongo_data: